version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: mk9_analytics_db
    environment:
      POSTGRES_USER: "mk9_user"
      POSTGRES_PASSWORD: "mk9_super_password123"
      POSTGRES_DB: "mk9_analytics"
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    restart: unless-stopped

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: mk9_analytics_n8n
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: "0.0.0.0"
      N8N_PORT: "5678"
      N8N_PROTOCOL: "http"
      N8N_DB_TYPE: "postgresdb"
      N8N_DB_POSTGRESDB_HOST: "db"
      N8N_DB_POSTGRESDB_PORT: "5432"
      N8N_DB_POSTGRESDB_DATABASE: "mk9_analytics"
      N8N_DB_POSTGRESDB_USER: "mk9_user"
      N8N_DB_POSTGRESDB_PASSWORD: "mk9_super_password123"
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_ADMIN: "mk9_user"
      N8N_BASIC_AUTH_PASSWORD: "mk9_super_password123"
      N8N_DIAGNOSTICS_ENABLED: "true"
      N8N_LOG_LEVEL: "info"
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    depends_on:
      - db

volumes:
  pgdata:
  n8n_data: