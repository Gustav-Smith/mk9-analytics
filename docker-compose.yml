services:
  postgres:

    container_name: mk9-postgres
    image: postgres:16

    restart: unless-stopped

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    environment:
      POSTGRES_USER: mk9
      POSTGRES_PASSWORD: mk9
      POSTGRES_DB: mk9_analytics

volumes:
  postgres_data:
